name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build
        run: gradle build --no-daemon --no-configuration-cache

      - uses: actions/upload-artifact@v4
        with:
          name: asiantiertagger-1.0.0
          path: build/libs/asiantiertagger-1.0.0.jar
          retention-days: 30
